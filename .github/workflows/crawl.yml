name: Crawl & publish M3U

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 min (GitHub may delay/coalesce runs)
  workflow_dispatch:         # manual run button
  push:
    branches: [main]
    paths: [main.py]         # code changes trigger an immediate run

# allow Pages deploy; one run at a time
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # No dependencies — main.py is pure stdlib (urllib/json). No browser needed.
      # SOCOLIVE_API: set repo Variable to the Cloudflare Worker URL (datacenter
      # IPs get 403 hitting json.vnres.co directly). Falls back to direct if unset.
      - name: Crawl
        env:
          SOCOLIVE_OUT: public
          SOCOLIVE_API: ${{ vars.SOCOLIVE_API || 'https://json.vnres.co' }}
        run: python main.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: crawl
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
